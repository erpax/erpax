# Standards-banner check + Lint + TypeScript + Vitest must pass before production build.
# `pnpm run typecheck` catches invalid imports/exports (same class of errors as `next build` / Turbopack).
# `pnpm run standards:check` catches malformed JSDoc standards banners (per docs/STANDARDS.md §3).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standards:
    name: Standards banner check
    runs-on: ubuntu-latest
    # No pnpm install needed — pure bash + grep over the working tree.
    steps:
      - uses: actions/checkout@v4

      - name: Verify every @standard / @rfc / @compliance / @accounting / @security / @audit / @quality tag has a value
        run: bash scripts/standards-citation-index.sh --check

      - name: Verify every src/standards/<id>/ implementation file cites @standard or @rfc
        run: bash scripts/standards-citation-index.sh --required

      - name: Verify docs/STANDARDS_INDEX.md is in sync with current banners
        run: bash scripts/standards-citation-index.sh --verify-index

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Application src (zero ESLint warnings)
        run: pnpm run lint:src

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: test-secret-not-for-production-32-characters
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Slice TTT: regenerate payload-types from the live config and fail if
      # the committed payload-types.ts is out of sync. Stale types let tsc
      # pass in dev but break in fresh checkouts.
      - name: Verify payload-types.ts is fresh
        run: pnpm run payload:verify-types

      - name: Typecheck (tsc --noEmit)
        run: pnpm run typecheck

  test-int:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: test-secret-not-for-production-32-characters
      PAYLOAD_TEST_SKIP_MIGRATE: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm run test:int

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [standards, lint, typecheck, test-int]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          PAYLOAD_SECRET: test-secret-not-for-production-32-characters
